name: Backend CD

on:
  push:
    branches:
      - main

concurrency:
  group: backend-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.repo.outputs.image }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image name
        id: repo
        shell: bash
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY,,}"
          IMAGE="${{ env.REGISTRY }}/${REPO}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "cache=$IMAGE:buildcache" >> "$GITHUB_OUTPUT"

      - name: Derive short SHA tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          pull: true
          push: true
          tags: |
            ${{ steps.repo.outputs.image }}:latest
            ${{ steps.repo.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=registry,ref=${{ steps.repo.outputs.cache }}
          cache-to: type=registry,ref=${{ steps.repo.outputs.cache }},mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            compose.yaml
            flyway/sql

      - name: Ensure target directories exist
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.APP_DIR }}"
            mkdir -p "${{ secrets.APP_DIR }}/flyway/sql"

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "compose.yaml"
          target: "${{ secrets.APP_DIR }}/"
          overwrite: true

      - name: Copy Flyway migrations to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "flyway/sql/*"
          target: "${{ secrets.APP_DIR }}/flyway/sql"
          strip_components: 2
          overwrite: true

      - name: Generate .env on server
        uses: appleboy/ssh-action@v1.2.1
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          APP_DB_USERNAME: ${{ secrets.APP_DB_USERNAME }}
          APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: POSTGRES_PASSWORD,APP_DB_USERNAME,APP_DB_PASSWORD,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,FRONTEND_URL
          script: |
            set -euo pipefail
            ENV_FILE="${{ secrets.APP_DIR }}/.env"

            cat > "$ENV_FILE" <<EOF
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            APP_DB_USERNAME=${APP_DB_USERNAME}
            APP_DB_PASSWORD=${APP_DB_PASSWORD}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            FRONTEND_URL=${FRONTEND_URL}
            EOF

            chmod 600 "$ENV_FILE"

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.1
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          SHA_TAG: ${{ needs.build-and-push.outputs.sha_tag }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: GHCR_USERNAME,GHCR_TOKEN,IMAGE,SHA_TAG
          script: |
            set -euo pipefail
            cd "${{ secrets.APP_DIR }}"

            export COMPOSE_FILE=compose.yaml

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            docker compose pull postgres backend

            docker compose up -d postgres

            docker compose --profile migrate run --rm flyway

            docker compose up -d --no-deps --force-recreate backend

            docker image prune -f

            docker compose ps